<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VISA Careiro — Injetar Usuários</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>

<!-- 🔗 LINK COM SEU MÓDULO CENTRAL -->
<script src="./firebase-config.js"></script>

<style>
:root {
  --rosa: #f48aab; --bg: #f5e8ef; --text: #2d1b24;
  --border: #f5c6d4; --success: #6bcb8b; --danger: #e05a6b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif; background: var(--bg);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.card {
  background: #fff; border-radius: 20px; padding: 40px 36px;
  max-width: 560px; width: 100%;
  box-shadow: 0 8px 40px rgba(244,138,171,.2);
  border: 1.5px solid var(--border);
}
.header { text-align: center; margin-bottom: 32px; }
.logo { font-size: 48px; margin-bottom: 12px; }
h1 { font-size: 22px; color: var(--text); margin-bottom: 6px; }
p.sub { font-size: 13px; color: #999; }

.users-preview {
  background: #fdf4f8; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 24px;
}
.users-preview h3 {
  font-size: 13px; font-weight: 700; color: #999;
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px;
}
.user-row {
  display: flex; align-items: center; gap: 14px;
  background: #fff; border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; margin-bottom: 10px;
}
.user-row:last-child { margin-bottom: 0; }
.user-icon { font-size: 24px; width: 40px; text-align: center; }
.user-details { flex: 1; }
.user-email { font-weight: 700; font-size: 14px; color: var(--text); }
.user-senha { font-size: 12px; color: #999; margin-top: 2px; }
.user-badge {
  padding: 3px 12px; border-radius: 50px;
  font-size: 11px; font-weight: 700;
}
.badge-adm { background: #fde8ee; color: #c0185a; border: 1px solid var(--border); }
.badge-fiscal { background: #e8f0ff; color: #3a5dc9; border: 1px solid #b8c8f5; }

.btn-inject {
  width: 100%; padding: 14px; background: var(--rosa);
  color: #fff; border: none; border-radius: 50px;
  font-size: 16px; font-weight: 700; cursor: pointer;
}
.btn-inject:disabled { opacity: .5; }

.log {
  margin-top: 20px; border-radius: 12px; overflow: hidden;
  border: 1.5px solid var(--border); display: none;
}
.log-header {
  background: var(--border); padding: 10px 16px;
  font-size: 12px; font-weight: 700; color: var(--text);
}
.log-body { padding: 14px 16px; background: #fff; font-size: 13px; }
.log-line.ok { color: #2a6e47; }
.log-line.err { color: var(--danger); }

.warning-box {
  background: #fff8e0; border: 1.5px solid #f6c341;
  border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
  font-size: 12px; color: #7a5c00;
}
</style>
</head>

<body>

<div class="card">
  <div class="header">
    <div class="logo">🏥</div>
    <h1>VISA Careiro — Injetar Usuários</h1>
    <p class="sub">Injeção única no Firestore</p>
  </div>

  <div class="warning-box">
    <strong>⚠️ Use apenas uma vez!</strong><br>
    Após criar os usuários, delete este arquivo.
  </div>

  <div class="users-preview">
    <h3>Usuários</h3>

    <div class="user-row">
      <div class="user-icon">🛡️</div>
      <div class="user-details">
        <div class="user-email">adm@visa.com</div>
        <div class="user-senha">Senha: <strong>adm@2025</strong></div>
      </div>
      <span class="user-badge badge-adm">Admin</span>
    </div>

    <div class="user-row">
      <div class="user-icon">🔍</div>
      <div class="user-details">
        <div class="user-email">fiscal@visa.com</div>
        <div class="user-senha">Senha: <strong>fiscal@2025</strong></div>
      </div>
      <span class="user-badge badge-fiscal">Fiscal</span>
    </div>
  </div>

  <button class="btn-inject" onclick="injectUsers()" id="btn">
    💾 Injetar Usuários
  </button>

  <div class="log" id="logBox">
    <div class="log-header">Log</div>
    <div class="log-body" id="logBody"></div>
  </div>
</div>

<script>
const USERS = [
  { id:'adm_visa_com', email:'adm@visa.com', senha:'adm@2025', role:'admin' },
  { id:'fiscal_visa_com', email:'fiscal@visa.com', senha:'fiscal@2025', role:'fiscal' }
];

function log(msg, type='ok') {
  const box = document.getElementById('logBox');
  const body = document.getElementById('logBody');
  box.style.display = 'block';
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.innerHTML = msg;
  body.appendChild(line);
}

async function injectUsers() {
  const btn = document.getElementById('btn');
  btn.disabled = true;

  for (const user of USERS) {
    try {
      await _USERS_REF.doc(user.id).set({
        email: user.email,
        senha: user.senha,
        role: user.role,
        createdAt: new Date().toISOString()
      });
      log(`✅ ${user.email} criado`);
    } catch (e) {
      log(`❌ erro: ${e.message}`, 'err');
    }
  }

  btn.innerText = 'Concluído';
}
</script>

</body>
</html>
